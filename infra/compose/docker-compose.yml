services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
    labels:
      project: pantherhacks
    ports:
      - "8000:8000"
    environment:
      API_PORT: 8000
    volumes:
      - ../../artifacts:/workspace/artifacts

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    labels:
      project: pantherhacks
    ports:
      - "5000:5000"
    command: >-
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow

volumes:
  mlflow_data:
    labels:
      project: pantherhacks
